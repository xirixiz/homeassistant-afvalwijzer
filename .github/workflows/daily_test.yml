name: "Afvalwijzer: Daily Test"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  test-module:
    runs-on: "ubuntu-latest"
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          # audit, not block: this job calls dozens of live waste-provider
          # APIs on arbitrary domains, which can't be pinned to a fixed
          # allowed-endpoints list.
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.x"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - run: python3 -m pip install --upgrade pip
      - run: python3 -m pip install -r requirements.txt
      - name: Enable all addresses
        run: sed -i 's/#{"provider"/{"provider"/g' tests/test_data.py
      - name: Test module
        run: |
          set -o pipefail
          scripts/test-module --show-failures-only 2>&1 | tee $GITHUB_STEP_SUMMARY
